description: >-
  Cabot Oil & Gas was an independent oil and gas company engaged in the
  development, exploitation, exploration, production, and marketing of
  natural gas and oil properties in the United States. In 2021 it merged
  with Cimarex Energy to form Coterra Energy, which operates across the
  Permian Basin, Marcellus Shale, and Anadarko Basin.
